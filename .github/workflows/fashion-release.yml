name: Fashion Portable And Docker Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag or label used in artifact names"
        required: false
        default: ""
        type: string
      babeldoc_source:
        description: "Which BabelDOC source to build from"
        required: true
        default: "local-stable"
        type: choice
        options:
          - local-stable
          - github-latest
          - github-ref
      babeldoc_git_ref:
        description: "Required only when babeldoc_source is github-ref"
        required: false
        default: ""
        type: string
      publish_release_asset:
        description: "Upload release assets to a GitHub release"
        required: true
        default: true
        type: boolean
      publish_ghcr:
        description: "Push the Docker image to GHCR"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

env:
  PORTABLE_PYTHON_VERSION: "3.13.3"
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-portable:
    name: Build Windows portable package
    runs-on: windows-2025-vs2026
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      portable_zip_name: ${{ steps.meta.outputs.portable_zip_name }}
      babeldoc_version: ${{ steps.babeldoc-version.outputs.version }}
      release_label: ${{ steps.meta.outputs.release_label }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python ${{ env.PORTABLE_PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PORTABLE_PYTHON_VERSION }}
          architecture: x64

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./PDFMathTranslate-next/web/package-lock.json

      - name: Build React WebUI
        shell: pwsh
        working-directory: ./PDFMathTranslate-next/web
        run: |
          npm ci
          npm run build

      - name: Build package metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.release_tag }}") {
            $label = "${{ github.event.inputs.release_tag }}"
          } else {
            $label = "manual-${{ github.run_number }}"
          }
          $artifactName = "fashion-portable-$label"
          $zipName = "pdftranslate-fashion-$label.zip"
          "release_label=$label" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "portable_zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build fashion portable package
        shell: pwsh
        working-directory: ./PDFMathTranslate-next
        run: |
          .\script\build_fashion_portable.ps1 `
            -OutputDir "$PWD\dist\pdf2zh-fashion-portable" `
            -PythonVersion "${{ env.PORTABLE_PYTHON_VERSION }}" `
            -BabelDOCSource "${{ github.event.inputs.babeldoc_source }}" `
            -BabelDOCGitRef "${{ github.event.inputs.babeldoc_git_ref }}"

      - name: Detect BabelDOC version
        id: babeldoc-version
        shell: pwsh
        working-directory: ./PDFMathTranslate-next
        run: |
          $infoFile = ".\dist\pdf2zh-fashion-portable\BABELDOC-BUILD-INFO.txt"
          $versionLine = Select-String -Path $infoFile -Pattern "^BabelDOC version: "
          $version = $versionLine.Line.Split(":")[1].Trim()
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Rename portable zip for artifact publishing
        shell: pwsh
        working-directory: ./PDFMathTranslate-next
        run: |
          Move-Item -LiteralPath ".\dist\pdf2zh-fashion-portable.zip" -Destination ".\dist\${{ steps.meta.outputs.portable_zip_name }}" -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            ./PDFMathTranslate-next/dist/pdf2zh-fashion-portable
            ./PDFMathTranslate-next/dist/${{ steps.meta.outputs.portable_zip_name }}
          if-no-files-found: error
          include-hidden-files: true
          compression-level: 1

  build-tauri-desktop:
    name: Build Tauri desktop app (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-portable
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2025-vs2026
          - macos-14
          - ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./PDFMathTranslate-next/web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Download bundled Windows backend
        if: runner.os == 'Windows'
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build-portable.outputs.artifact_name }}
          path: ./downloaded-portable-backend

      - name: Stage bundled backend resource
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $resourceDir = Join-Path $PWD "PDFMathTranslate-next\src-tauri\resources\backend"
          if (Test-Path -LiteralPath $resourceDir) {
            Remove-Item -LiteralPath $resourceDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $resourceDir | Out-Null

          $backendDir = Get-ChildItem -Path ".\downloaded-portable-backend" -Directory -Recurse |
            Where-Object { Test-Path -LiteralPath (Join-Path $_.FullName "runtime\python.exe") } |
            Select-Object -First 1
          if ($null -eq $backendDir) {
            Write-Error "Unable to find downloaded portable backend runtime."
          }

          Get-ChildItem -LiteralPath $backendDir.FullName -Force |
            Copy-Item -Destination $resourceDir -Recurse -Force

          if (-not (Test-Path -LiteralPath (Join-Path $resourceDir "runtime\python.exe"))) {
            Write-Error "Bundled backend resource is missing runtime\python.exe."
          }
          if (-not (Test-Path -LiteralPath (Join-Path $resourceDir "config\distribution.toml"))) {
            Write-Error "Bundled backend resource is missing config\distribution.toml."
          }
          if (-not (Test-Path -LiteralPath (Join-Path $resourceDir "data\babeldoc-cache"))) {
            Write-Error "Bundled backend resource is missing restored BabelDOC assets."
          }
          if (-not (Test-Path -LiteralPath (Join-Path $resourceDir "runtime\site-packages\sklearn\.libs\vcomp140.dll"))) {
            Write-Error "Bundled backend resource is missing sklearn\.libs\vcomp140.dll. Ensure hidden files are preserved in the portable artifact."
          }
          if (-not (Test-Path -LiteralPath (Join-Path $resourceDir "runtime\site-packages\sklearn\.libs\msvcp140.dll"))) {
            Write-Error "Bundled backend resource is missing sklearn\.libs\msvcp140.dll. Ensure hidden files are preserved in the portable artifact."
          }

      - name: Build Tauri desktop app
        working-directory: ./PDFMathTranslate-next
        run: |
          npm ci --prefix ./web
          npm run --prefix ./web build
          npm exec --prefix ./web -- tauri build

      - name: Upload Tauri desktop artifact
        uses: actions/upload-artifact@v6
        with:
          name: pdftranslate-desktop-${{ matrix.os }}-${{ needs.build-portable.outputs.release_label }}
          path: ./PDFMathTranslate-next/src-tauri/target/release/bundle/**
          if-no-files-found: error
          compression-level: 1

  publish-github-release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs:
      - build-portable
      - build-tauri-desktop
    if: github.event.inputs.publish_release_asset == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download portable artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build-portable.outputs.artifact_name }}
          path: ./downloaded-artifact

      - name: Download Tauri desktop artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: pdftranslate-desktop-*-${{ needs.build-portable.outputs.release_label }}
          path: ./downloaded-tauri
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ needs.build-portable.outputs.release_label }}"
          TITLE="Fashion portable release ${TAG}"
          ASSET_PATH="./downloaded-artifact/${{ needs.build-portable.outputs.portable_zip_name }}"
          if [ ! -f "$ASSET_PATH" ]; then
            ASSET_PATH="$(find ./downloaded-artifact -type f -name '${{ needs.build-portable.outputs.portable_zip_name }}' | head -n 1)"
          fi
          if [ -z "$ASSET_PATH" ] || [ ! -f "$ASSET_PATH" ]; then
            echo "Portable zip not found after artifact download." >&2
            find ./downloaded-artifact -maxdepth 3 -type f | sort || true
            exit 1
          fi
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --repo "$GH_REPO" --title "$TITLE" --notes "Automated PDFTranslate fashion release. Windows Tauri desktop installers include the bundled portable Python/FastAPI backend resource."
          fi
          gh release upload "$TAG" "$ASSET_PATH" --repo "$GH_REPO" --clobber
          mapfile -d '' TAURI_ASSETS < <(find ./downloaded-tauri -type f \( \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.dmg' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.tar.gz' \
          \) -print0 | sort -z)
          if [ "${#TAURI_ASSETS[@]}" -eq 0 ]; then
            echo "No Tauri bundle files found after artifact download." >&2
            find ./downloaded-tauri -maxdepth 5 -type f | sort || true
            exit 1
          fi
          for asset in "${TAURI_ASSETS[@]}"; do
            gh release upload "$TAG" "$asset" --repo "$GH_REPO" --clobber
          done

  build-docker:
    name: Build and optionally push Docker image
    runs-on: ubuntu-latest
    needs: build-portable
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute Docker build args
        id: docker-args
        shell: bash
        run: |
          case "${{ github.event.inputs.babeldoc_source }}" in
            local-stable)
              echo "source=stable" >> "$GITHUB_OUTPUT"
              ;;
            github-latest)
              echo "source=latest" >> "$GITHUB_OUTPUT"
              ;;
            github-ref)
              echo "source=ref" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported babeldoc_source" >&2
              exit 1
              ;;
          esac

      - name: Log in to GHCR
        if: github.event.inputs.publish_ghcr == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        shell: bash
        run: |
          VERSION_TAG="${{ needs.build-portable.outputs.release_label }}-babeldoc-v${{ needs.build-portable.outputs.babeldoc_version }}"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "image_name=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./PDFMathTranslate-next
          file: ./PDFMathTranslate-next/Dockerfile
          push: ${{ github.event.inputs.publish_ghcr == 'true' }}
          tags: |
            ${{ steps.tags.outputs.image_name }}:${{ steps.tags.outputs.version_tag }}
            ${{ steps.tags.outputs.image_name }}:latest
          build-args: |
            BABELDOC_SOURCE=${{ steps.docker-args.outputs.source }}
            BABELDOC_GIT_REF=${{ github.event.inputs.babeldoc_git_ref }}
            BABELDOC_STABLE_REF=v0.6.3
